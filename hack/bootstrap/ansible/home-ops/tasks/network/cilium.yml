---
- name: Ensure temporary bootstrap directory exists
  ansible.builtin.file:
    path: /tmp/home-ops-bootstrap
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Require drydock >= 0.2.1 on the controller
  delegate_to: localhost
  run_once: true
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      v="$(mise x -- drydock version | awk '/^version:/{print $2}' | sed 's/^v//')"
      [ "$(printf '%s\n%s\n' 0.2.1 "$v" | sort -V | head -n1)" = 0.2.1 ] || { echo "drydock >= v0.2.1 required, found v$v" >&2; exit 1; }
    executable: /bin/bash
  changed_when: false

- name: Render cilium-bootstrap manifests with drydock (controller-side)
  delegate_to: localhost
  run_once: true
  vars:
    # drydock --discover-kustomize requires a repo-relative path, so render into
    # the gitignored hack/bootstrap/.out tree under the repo root (not /tmp).
    home_ops_cilium_render_rel: hack/bootstrap/.out/cilium-bootstrap-render
    home_ops_cilium_render_abs: "{{ home_ops_repo_root }}/hack/bootstrap/.out/cilium-bootstrap-render"
  block:
    - name: Ensure the controller render dir exists
      ansible.builtin.file:
        path: "{{ home_ops_cilium_render_abs }}"
        state: directory
        mode: "0755"

    - name: Ensure drydock cache dirs exist
      ansible.builtin.file:
        path: "{{ home_ops_drydock_cache }}/{{ item }}"
        state: directory
        mode: "0755"
      loop: [git, charts, remotes, render]

    - name: Copy the cilium-bootstrap kustomization
      ansible.builtin.copy:
        src: "{{ home_ops_repo_root }}/hack/bootstrap/cilium-bootstrap/kustomization.yaml"
        dest: "{{ home_ops_cilium_render_abs }}/kustomization.yaml"
        mode: "0644"

    - name: Render the cilium-bootstrap Application (per-env values + injected version)
      ansible.builtin.template:
        src: cilium-bootstrap-application.yaml.j2
        dest: "{{ home_ops_cilium_render_abs }}/application.yaml"
        mode: "0644"

    - name: Render cilium manifests with drydock
      ansible.builtin.command:
        cmd: >-
          mise x -- drydock build app cilium-bootstrap
          --path .
          --discover-kustomize {{ home_ops_cilium_render_rel }}
          --output yaml
          --git-cache-dir {{ home_ops_drydock_cache }}/git
          --chart-cache-dir {{ home_ops_drydock_cache }}/charts
          --remote-cache-dir {{ home_ops_drydock_cache }}/remotes
          --render-cache-dir {{ home_ops_drydock_cache }}/render
        chdir: "{{ home_ops_repo_root }}"
      register: home_ops_cilium_render
      changed_when: false

- name: Check existing Cilium DaemonSet
  ansible.builtin.command: "{{ k3s_kubectl_binary }} -n kube-system get daemonset/cilium"
  register: home_ops_cilium_daemonset
  failed_when: false
  changed_when: false

- name: Install bootstrap Cilium when absent
  when: home_ops_cilium_daemonset.rc != 0
  block:
    - name: Write rendered cilium manifests to the node
      ansible.builtin.copy:
        content: "{{ home_ops_cilium_render.stdout }}\n"
        dest: /tmp/home-ops-bootstrap/cilium-bootstrap.yaml
        owner: root
        group: root
        mode: "0600"

    - name: Apply rendered cilium manifests
      ansible.builtin.command:
        cmd: "{{ k3s_kubectl_binary }} apply --server-side --field-manager argocd-controller -f /tmp/home-ops-bootstrap/cilium-bootstrap.yaml"
      environment:
        KUBECONFIG: "{{ home_ops_k3s_kubeconfig }}"
      register: home_ops_cilium_apply
      changed_when: home_ops_cilium_apply.rc == 0

- name: Wait for Cilium operator
  ansible.builtin.command: >-
    {{ k3s_kubectl_binary }} -n kube-system rollout status deployment/cilium-operator
    --timeout={{ home_ops_cilium_rollout_timeout }}
  changed_when: false

- name: Wait for Cilium DaemonSet
  ansible.builtin.command: >-
    {{ k3s_kubectl_binary }} -n kube-system rollout status daemonset/cilium
    --timeout={{ home_ops_cilium_rollout_timeout }}
  changed_when: false

- name: Wait for all nodes to become Ready
  ansible.builtin.command: >-
    {{ k3s_kubectl_binary }} wait node --all --for=condition=Ready
    --timeout={{ home_ops_cilium_rollout_timeout }}
  changed_when: false
