---
- name: Persist home-ops K3s sysctls
  ansible.builtin.copy:
    dest: /etc/sysctl.d/90-home-ops-k3s.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
      fs.inotify.max_user_instances = {{ home_ops_fsnotify_max_user_instances }}
      fs.inotify.max_user_watches = {{ home_ops_fsnotify_max_user_watches }}
      fs.inotify.max_queued_events = {{ home_ops_fsnotify_max_queued_events }}

- name: Apply home-ops K3s sysctls
  ansible.builtin.command: sysctl --system
  changed_when: false
