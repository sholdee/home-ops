---
- name: Load required kernel modules
  ansible.builtin.command: "modprobe {{ item }}"
  loop: "{{ home_ops_kernel_modules }}"
  changed_when: false

- name: Load optional kernel modules when available
  ansible.builtin.command: "modprobe {{ item }}"
  loop: "{{ home_ops_optional_kernel_modules }}"
  changed_when: false
  failed_when: false

- name: Persist required kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/home-ops-k3s.conf
    owner: root
    group: root
    mode: "0644"
    content: "{{ home_ops_kernel_modules | join('\n') }}\n"
