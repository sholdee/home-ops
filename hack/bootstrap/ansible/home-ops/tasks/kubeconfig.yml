---
- name: Copy K3s kubeconfig to a bootstrap-safe path
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ home_ops_remote_kubeconfig }}"
    remote_src: true
    owner: root
    group: root
    mode: "0600"

- name: Configure kubeconfig API endpoint
  ansible.builtin.command: >-
    {{ k3s_kubectl_binary }} config set-cluster default
    --server=https://{{ apiserver_endpoint }}:6443
    --kubeconfig {{ home_ops_remote_kubeconfig }}
  changed_when: true

- name: Fetch kubeconfig for bootstrap wrapper
  ansible.builtin.fetch:
    src: "{{ home_ops_remote_kubeconfig }}"
    dest: "{{ home_ops_kubeconfig_output }}"
    flat: true
  when:
    - home_ops_kubeconfig_output is defined
    - home_ops_kubeconfig_output | length > 0
