---
- name: Wait for API endpoint before joining agent
  ansible.builtin.wait_for:
    host: "{{ apiserver_endpoint }}"
    port: 6443
    timeout: 240

- name: Render K3s agent service
  ansible.builtin.template:
    src: templates/k3s-agent.service.j2
    dest: "{{ systemd_dir }}/{{ home_ops_k3s_agent_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  register: home_ops_k3s_agent_service

- name: Start K3s agent service
  ansible.builtin.systemd:
    name: "{{ home_ops_k3s_agent_service_name }}"
    daemon_reload: true
    enabled: true
    state: >-
      {{
        'restarted'
        if home_ops_k3s_agent_service.changed or (home_ops_k3s_registries_config.changed | default(false))
        else 'started'
      }}

- name: Wait for joined worker node object
  ansible.builtin.command: "{{ k3s_kubectl_binary }} get node/{{ home_ops_node_name }}"
  delegate_to: "{{ home_ops_first_master }}"
  changed_when: false
  register: home_ops_joined_agent_node
  until: home_ops_joined_agent_node.rc == 0
  retries: "{{ retry_count }}"
  delay: 5
