---
- name: Load required kernel modules
  ansible.builtin.command: "modprobe {{ item }}"
  loop:
    - br_netfilter
    - overlay
  changed_when: false

- name: Persist required kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/home-ops-k3s.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      br_netfilter
      overlay

- name: Persist Kubernetes networking sysctls
  ansible.builtin.copy:
    dest: /etc/sysctl.d/90-home-ops-k3s.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

- name: Apply Kubernetes networking sysctls
  ansible.builtin.command: sysctl --system
  changed_when: false
