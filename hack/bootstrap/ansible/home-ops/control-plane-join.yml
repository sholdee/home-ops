---
- name: Join one home-ops control-plane node with a temporary scheduling taint
  hosts: master
  gather_facts: true
  become: true
  vars:
    home_ops_node_taints:
      - node.home-ops.sh/joining=true:NoSchedule
  tasks:
    - name: Prepare control-plane host prerequisites
      ansible.builtin.import_tasks: tasks/node-prep/main.yml

    - name: Install K3s binary
      ansible.builtin.import_tasks: tasks/k3s/download.yml

    - name: Write K3s token file
      ansible.builtin.import_tasks: tasks/k3s/token.yml

    - name: Write K3s registry mirror config
      ansible.builtin.import_tasks: tasks/k3s/registries.yml

    - name: Install etcdctl
      ansible.builtin.import_tasks: tasks/k3s/etcdctl.yml

    - name: Reset stale local K3s server database
      ansible.builtin.import_tasks: tasks/k3s/reset-server-db.yml

    - name: Disable K3s kube-proxy before server join
      ansible.builtin.import_tasks: tasks/k3s/kube-proxy-disable.yml

    - name: Join K3s server with temporary taint
      ansible.builtin.import_tasks: tasks/k3s/join-servers.yml
