---
- name: Remove the temporary home-ops worker joining taint from K3s service args
  hosts: node
  gather_facts: true
  become: true
  vars:
    home_ops_node_taints: []
  tasks:
    - name: Run worker preflight checks
      ansible.builtin.import_tasks: tasks/node-prep/preflight.yml

    - name: Validate inventory node IP
      ansible.builtin.import_tasks: tasks/node-prep/node-ip.yml

    - name: Write K3s token file
      ansible.builtin.import_tasks: tasks/k3s/token.yml

    - name: Render K3s agent service without temporary taint
      ansible.builtin.import_tasks: tasks/k3s/join-agents.yml
