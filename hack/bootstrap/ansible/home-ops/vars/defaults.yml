---
group_name_master: master
group_name_node: node
k3s_kubectl_binary: k3s kubectl
systemd_dir: /etc/systemd/system

home_ops_supported_os_family: Debian
home_ops_supported_distributions:
  - Debian
  - Raspbian
  - Raspberry Pi OS
  - Ubuntu
home_ops_supported_architectures:
  - aarch64
  - arm64
  - x86_64
  - amd64

home_ops_debian_packages:
  - ca-certificates
  - curl
  - iproute2
  - iptables
  - jq
  - nfs-common
  - open-iscsi
  - socat

home_ops_k3s_binary_path: /usr/local/bin/k3s
home_ops_k3s_server_service_name: k3s
home_ops_k3s_agent_service_name: k3s-node
home_ops_k3s_manifests_dir: /var/lib/rancher/k3s/server/manifests
home_ops_k3s_runtime_dir: /var/lib/rancher/k3s/server
home_ops_k3s_config_dir: /etc/rancher/k3s
home_ops_k3s_token_file: /etc/rancher/k3s/home-ops-token
home_ops_k3s_registries_file: "{{ home_ops_k3s_config_dir }}/registries.yaml"
home_ops_k3s_registry_mirrors:
  docker.io:
  ecr-public.aws.com:
  ghcr.io:
  oci.external-secrets.io:
  quay.io:
  registry.k8s.io:
home_ops_remote_kubeconfig: /tmp/home-ops-kubeconfig
home_ops_cilium_values_file: /tmp/home-ops-cilium-values.yaml
home_ops_cilium_checksum_file: /var/lib/rancher/k3s/server/home-ops-cilium-bootstrap.sha256
# Empty means derive the upstream etcdctl base version from the K3s release's
# embedded Etcd version, such as K3s Etcd v3.6.7-k3s1 -> etcdctl v3.6.7.
home_ops_etcdctl_version_override: ""
home_ops_etcdctl_binary_path: /usr/local/bin/etcdctl

kube_vip_enabled: true
kube_vip_arp: true
kube_vip_bgp: false
kube_vip_iface: ""

retry_count: 45

home_ops_first_master: "{{ groups[group_name_master][0] }}"
home_ops_first_master_join_ip: "{{ hostvars[home_ops_first_master].k3s_node_ip | string | split(',') | first }}"
home_ops_node_name: "{{ ansible_facts.hostname | default(inventory_hostname) }}"
home_ops_validate_ansible_host_ip: false
home_ops_node_prep_auto_reboot: "{{ not (home_ops_k3s_installed | default(false) | bool) }}"
home_ops_node_prep_reboot_marker: /var/lib/home-ops/node-prep-reboot-required
home_ops_min_rootfs_size_bytes: 8589934592
home_ops_min_rootfs_available_bytes: 268435456
home_ops_min_apt_cache_available_bytes: 268435456
home_ops_raspberry_pi_cmdline_args:
  - cgroup_enable=cpuset
  - cgroup_memory=1
  - cgroup_enable=memory
  - nvme_core.default_ps_max_latency_us=0
  - pcie_aspm=off
  - pcie_port_pm=off
home_ops_raspberry_pi_config_block: |
  dtparam=pciex1
  dtparam=nvme
  dtparam=pciex1_gen=3
  dtoverlay=cma,cma-96
  dtparam=audio=off
  dtoverlay=disable-wifi
  dtoverlay=disable-bt
  arm_boost=1
home_ops_cpu_governor: performance
home_ops_fsnotify_max_user_instances: 1024
home_ops_fsnotify_max_user_watches: 524288
home_ops_fsnotify_max_queued_events: 65536

home_ops_first_server_args: >-
  {{ '--cluster-init' if (groups[group_name_master] | length) > 1 else '' }}
  --token-file {{ home_ops_k3s_token_file }}
  {{ extra_server_args | default('') }}
home_ops_join_server_args: >-
  --server https://{{ home_ops_first_master_join_ip }}:6443
  --token-file {{ home_ops_k3s_token_file }}
  {{ extra_server_args | default('') }}
home_ops_agent_args: >-
  --server https://{{ apiserver_endpoint }}:6443
  --token-file {{ home_ops_k3s_token_file }}
  {{ extra_agent_args | default('') }}
home_ops_node_taints: []

cilium_iface: auto
cilium_export_pod_cidr: "false"
cilium_extra_values_files: []

home_ops_rpi_reporter_enabled: false
home_ops_rpi_reporter_repo: https://github.com/ironsheep/RPi-Reporter-MQTT2HA-Daemon.git
home_ops_rpi_reporter_version: 4951bc918c4d889467c3386794d9e0730add4ed6
home_ops_rpi_reporter_path: /opt/RPi-Reporter-MQTT2HA-Daemon
home_ops_rpi_reporter_service_name: isp-rpi-reporter
home_ops_rpi_reporter_daemon_user: daemon
home_ops_rpi_reporter_daemon_group: daemon
home_ops_rpi_reporter_update_existing: false
home_ops_rpi_reporter_apply_retain_patch: true
home_ops_rpi_reporter_manage_config: false
home_ops_rpi_reporter_restart_on_change: false
home_ops_rpi_reporter_daemon_enabled: true
home_ops_rpi_reporter_interval_in_minutes: 2
home_ops_rpi_reporter_fallback_domain: home
home_ops_rpi_reporter_mqtt_base_topic: home/nodes
home_ops_rpi_reporter_mqtt_discovery_prefix: homeassistant
home_ops_rpi_reporter_mqtt_hostname: "{{ lookup('ansible.builtin.env', 'HOME_OPS_RPI_REPORTER_MQTT_HOSTNAME') }}"
home_ops_rpi_reporter_mqtt_keepalive: 20
home_ops_rpi_reporter_mqtt_password: "{{ lookup('ansible.builtin.env', 'HOME_OPS_RPI_REPORTER_MQTT_PASSWORD') }}"
home_ops_rpi_reporter_mqtt_port: 8883
home_ops_rpi_reporter_mqtt_sensor_name: "{{ inventory_hostname }}"
home_ops_rpi_reporter_mqtt_tls: true
home_ops_rpi_reporter_mqtt_username: "{{ lookup('ansible.builtin.env', 'HOME_OPS_RPI_REPORTER_MQTT_USERNAME') }}"
home_ops_rpi_reporter_commands: {}

home_ops_nut_client_enabled: false
home_ops_nut_client_manage_config: false
home_ops_nut_client_restart_on_change: false
home_ops_nut_client_service_name: nut-monitor
home_ops_nut_mode: netclient
home_ops_nut_monitor_system: "{{ lookup('ansible.builtin.env', 'HOME_OPS_NUT_MONITOR_SYSTEM') }}"
home_ops_nut_monitor_user: "{{ lookup('ansible.builtin.env', 'HOME_OPS_NUT_MONITOR_USER') }}"
home_ops_nut_monitor_password: "{{ lookup('ansible.builtin.env', 'HOME_OPS_NUT_MONITOR_PASSWORD') }}"
home_ops_nut_monitor_power_value: 1
home_ops_nut_monitor_type: slave
home_ops_nut_deadtime: 15
home_ops_nut_finaldelay: 5
home_ops_nut_hostsync: 15
home_ops_nut_minsupplies: 1
home_ops_nut_nocommwarntime: 300
home_ops_nut_pollfreq: 5
home_ops_nut_pollfreqalert: 5
home_ops_nut_powerdownflag: /etc/killpower
home_ops_nut_rbwarntime: 43200
home_ops_nut_shutdowncmd: /sbin/shutdown -h +0

home_ops_github_runner_enabled: false
home_ops_github_runner_repo_owner: sholdee
home_ops_github_runner_repo_name: home-ops
home_ops_github_runner_url: "https://github.com/{{ home_ops_github_runner_repo_owner }}/{{ home_ops_github_runner_repo_name }}"
home_ops_github_runner_api_url: https://api.github.com
home_ops_github_runner_api_version: "2022-11-28"
home_ops_github_runner_access_token: "{{ lookup('ansible.builtin.env', 'HOME_OPS_GITHUB_RUNNER_ACCESS_TOKEN') }}"
home_ops_github_runner_version: 2.334.0
home_ops_github_runner_checksums:
  arm64: f44255bd3e80160eb25f71bc83d06ea025f6908748807a584687b3184759f7e4
  x64: 048024cd2c848eb6f14d5646d56c13a4def2ae7ee3ad12122bee960c56f3d271
home_ops_github_runner_install_dir: /opt/actions-runner
home_ops_github_runner_home: /var/lib/github-runner
home_ops_github_runner_user: github-runner
home_ops_github_runner_group: "{{ home_ops_github_runner_user }}"
home_ops_github_runner_name: "{{ inventory_hostname }}"
home_ops_github_runner_service_name: "actions.runner.{{ home_ops_github_runner_repo_owner }}-{{ home_ops_github_runner_repo_name }}.{{ home_ops_github_runner_name }}.service"
home_ops_github_runner_service_file: "{{ systemd_dir }}/{{ home_ops_github_runner_service_name }}"
home_ops_github_runner_work_dir: _work
home_ops_github_runner_labels:
  - home-ops
  - k3s
  - image-pull
home_ops_github_runner_packages:
  - git
  - gzip
  - jq
  - python3
  - sudo
  - tar
home_ops_github_runner_crictl_wrapper_path: /usr/local/bin/home-ops-crictl
home_ops_github_runner_crictl_runtime_endpoint: unix:///run/k3s/containerd/containerd.sock
home_ops_github_runner_crictl_timeout: 30
home_ops_github_runner_sudoers_file: /etc/sudoers.d/home-ops-github-runner
