---
- name: Prepare home-ops K3s nodes
  hosts: k3s_cluster
  gather_facts: true
  become: true
  tasks:
    - name: Prepare K3s node host prerequisites
      ansible.builtin.import_tasks: tasks/node-prep/main.yml

    - name: Install K3s binary
      ansible.builtin.import_tasks: tasks/k3s/download.yml

    - name: Write K3s token file
      ansible.builtin.import_tasks: tasks/k3s/token.yml

- name: Install home-ops control-plane tools
  hosts: master
  gather_facts: true
  become: true
  tasks:
    - name: Install etcdctl
      ansible.builtin.import_tasks: tasks/k3s/etcdctl.yml
      tags:
        - etcdctl

- name: Install first home-ops control-plane node
  hosts: master[0]
  gather_facts: true
  become: true
  tasks:
    - name: Render kube-vip bootstrap manifests
      ansible.builtin.import_tasks: tasks/network/kube-vip.yml

    - name: Start first K3s server
      ansible.builtin.import_tasks: tasks/k3s/first-server.yml

- name: Join remaining home-ops control-plane nodes
  hosts: master[1:]
  gather_facts: true
  become: true
  tasks:
    - name: Join K3s servers
      ansible.builtin.import_tasks: tasks/k3s/join-servers.yml

- name: Join home-ops worker nodes
  hosts: node
  gather_facts: true
  become: true
  tasks:
    - name: Join K3s agents
      ansible.builtin.import_tasks: tasks/k3s/join-agents.yml

- name: Install bootstrap Cilium
  hosts: master[0]
  gather_facts: true
  become: true
  tasks:
    - name: Install bootstrap Cilium
      ansible.builtin.import_tasks: tasks/network/cilium.yml

- name: Fetch home-ops kubeconfig
  hosts: master[0]
  gather_facts: true
  become: true
  tasks:
    - name: Prepare and fetch kubeconfig
      ansible.builtin.import_tasks: tasks/k3s/kubeconfig.yml

- name: Converge home-ops host services
  hosts: k3s_cluster
  gather_facts: true
  become: true
  tasks:
    - name: Apply host services
      ansible.builtin.import_tasks: tasks/host-services/main.yml
