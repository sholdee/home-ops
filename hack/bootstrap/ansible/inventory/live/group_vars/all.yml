---
ansible_user: ethan
ansible_ssh_private_key_file: ~/ansiblekey
systemd_dir: /etc/systemd/system
system_timezone: America/Chicago

proxmox_lxc_configure: false
custom_registries: false

cilium_iface: auto
kube_vip_iface: eth0
kube_vip_enabled: true
kube_vip_arp: true
kube_vip_bgp: false
k3s_master_taint: false
home_ops_validate_ansible_host_ip: true

home_ops_rpi_reporter_enabled: true
home_ops_nut_client_enabled: true

k3s_node_ip: "{{ ansible_host }}"
extra_args: >-
  --node-ip={{ k3s_node_ip }}
extra_server_args: >-
  {{ extra_args }}
  {{ '--node-taint node-role.kubernetes.io/master=true:NoSchedule' if k3s_master_taint else '' }}
  --flannel-backend=none
  --disable-network-policy
  --cluster-cidr={{ cluster_cidr }}
  --tls-san {{ apiserver_endpoint }}
  --disable servicelb
  --disable traefik
extra_agent_args: >-
  {{ extra_args }}
