---
- name: Prepare nodes for home-ops storage workloads
  hosts: k3s_cluster
  gather_facts: true
  become: true
  vars_files:
    - ../home-ops/vars/defaults.yml
  tasks:
    - name: Install Debian storage prerequisites
      ansible.builtin.apt:
        name:
          - cryptsetup
          - dmsetup
          - kmod
          - open-iscsi
          - nfs-common
        state: present
        update_cache: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Enable iSCSI daemon on Debian
      ansible.builtin.service:
        name: iscsid
        enabled: true
        state: started
      when: ansible_facts["os_family"] == "Debian"

    - name: Configure kernel prerequisites
      ansible.builtin.import_tasks: ../home-ops/tasks/node-prep/kernel.yml
