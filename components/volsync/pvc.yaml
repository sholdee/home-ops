---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-pvc
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: "longhorn"
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: app-bootstrap
