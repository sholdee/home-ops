---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Warm CI Caches

on:
  push:
    branches: [master]
    paths:
      - ".github/actions/setup-mise/action.yml"
      - ".github/workflows/validation.yml"
      - "hack/validate/**"
      - "lefthook.yml"
      - "mise.toml"
      - "mise.lock"
  workflow_dispatch:

jobs:
  warm-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Warm validation mise tools
        uses: ./.github/actions/setup-mise
        with:
          profile: validation

  warm-bootstrap-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Warm bootstrap-test mise tools
        uses: ./.github/actions/setup-mise
        with:
          profile: bootstrap-test

  warm-drydock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Warm drydock mise tools
        uses: ./.github/actions/setup-mise
        with:
          profile: drydock
