---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Warm CI Caches

on:
  push:
    branches: [master]
    paths:
      - '.github/actions/setup-mise/action.yml'
      - '.pre-commit-config.yaml'
      - 'mise.toml'
      - 'mise.lock'
  workflow_dispatch:

jobs:
  warm-pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Warm pre-commit mise tools
        uses: ./.github/actions/setup-mise
        with:
          profile: pre-commit

      - name: Warm pre-commit environment cache
        shell: bash
        run: |
          pre-commit install-hooks
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-4|${{ runner.os }}-${{ runner.arch }}|${{ hashFiles('.pre-commit-config.yaml', 'mise.toml', 'mise.lock') }}

  warm-bootstrap-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Warm bootstrap-test mise tools
        uses: ./.github/actions/setup-mise
        with:
          profile: bootstrap-test

  warm-drydock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Warm drydock mise tools
        uses: ./.github/actions/setup-mise
        with:
          profile: drydock
