---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.author.outputs.authorized }}
      gitops: ${{ steps.paths.outputs.gitops }}
      mise-toolchain: ${{ steps.paths.outputs.mise-toolchain }}
      renovate: ${{ steps.paths.outputs.renovate }}
    steps:
      - name: Check PR author
        id: author
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          AUTHORIZED_USERS=("sholdee" "pull-bunyan[bot]")
          AUTHORIZED=false

          for user in "${AUTHORIZED_USERS[@]}"; do
            if [[ "${user}" == "${PR_AUTHOR}" ]]; then
              AUTHORIZED=true
              break
            fi
          done

          echo "authorized=${AUTHORIZED}" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            gitops:
              - '.github/workflows/drydock-gitops.yml'
              - 'apps/**'
              - 'components/**'
            mise-toolchain:
              - '.github/actions/setup-mise/action.yml'
              - 'mise.toml'
              - 'mise.lock'
            renovate:
              - '.github/renovate.json5'

  validation:
    uses: ./.github/workflows/validation.yml

  bootstrap-test:
    uses: ./.github/workflows/bootstrap-test.yml

  mise-toolchain:
    needs: detect
    if: needs.detect.outputs.mise-toolchain == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup mise
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4
        with:
          install: false
          cache: false
          experimental: true
          github_token: ${{ github.token }}

      - name: Update mise binary
        run: mise self-update --yes --no-plugins

      - name: Verify mise lockfile is current
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mise lock --yes
          git diff --exit-code -- mise.lock

      - name: Install full locked mise toolchain
        uses: ./.github/actions/setup-mise
        with:
          profile: all

  renovate:
    needs: detect
    if: needs.detect.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate Renovate config
        run: |
          docker run --rm \
            --volume "${PWD}:/repo" \
            --workdir /repo \
            renovate/renovate:43.207.4@sha256:087bab575172b1926bbc57124d988015d899b0a82d45028514377b10a392f69d \
            renovate-config-validator .github/renovate.json5

  drydock-gitops:
    needs: detect
    if: needs.detect.outputs.authorized == 'true' && needs.detect.outputs.gitops == 'true'
    uses: ./.github/workflows/drydock-gitops.yml
    permissions:
      contents: read
      pull-requests: write
      issues: write
    secrets:
      BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
      BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}

  gate:
    runs-on: ubuntu-latest
    if: always()
    needs: [detect, validation, bootstrap-test, mise-toolchain, renovate, drydock-gitops]
    steps:
      - name: Evaluate results
        run: |
          DETECT="${{ needs.detect.result }}"
          VALIDATION="${{ needs.validation.result }}"
          BOOTSTRAP="${{ needs.bootstrap-test.result }}"
          MISE_TOOLCHAIN="${{ needs.mise-toolchain.result }}"
          RENOVATE="${{ needs.renovate.result }}"
          DRYDOCK="${{ needs.drydock-gitops.result }}"

          echo "detect=$DETECT validation=$VALIDATION bootstrap-test=$BOOTSTRAP mise-toolchain=$MISE_TOOLCHAIN renovate=$RENOVATE drydock-gitops=$DRYDOCK"

          if [[ "$DETECT" == "failure" || "$VALIDATION" == "failure" || "$BOOTSTRAP" == "failure" || "$MISE_TOOLCHAIN" == "failure" || "$RENOVATE" == "failure" || "$DRYDOCK" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi

          echo "CI passed"
