---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.author.outputs.authorized }}
      helm: ${{ steps.paths.outputs.helm }}
      docker-only: ${{ steps.eval.outputs.docker-only }}
    steps:
      - name: Check PR author
        id: author
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          AUTHORIZED_USERS=("sholdee" "pull-bunyan[bot]")
          AUTHORIZED=false

          for user in "${AUTHORIZED_USERS[@]}"; do
            if [[ "${user}" == "${PR_AUTHOR}" ]]; then
              AUTHORIZED=true
              break
            fi
          done

          echo "authorized=${AUTHORIZED}" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            helm:
              - '**/kustomization.yaml'
              - '**/values.yaml'
              - '**/values*.yaml'
              - 'apps/argocd/manifests/apps.yaml'
              - 'apps/argocd/manifests/cilium-preflight.yaml'

      - name: Evaluate docker-only
        id: eval
        env:
          HELM: ${{ steps.paths.outputs.helm }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          DOCKER_ONLY=false
          if [[ "${HELM}" != "true" ]]; then
            if [[ "${PR_TITLE}" == chore\(deps\)* ]] && { [[ "${PR_TITLE}" == *"docker tag"* ]] || [[ "${PR_TITLE}" == *"docker digest"* ]]; }; then
              DOCKER_ONLY=true
            fi
          fi

          echo "docker-only=${DOCKER_ONLY}" >> "$GITHUB_OUTPUT"

  pre-commit:
    uses: ./.github/workflows/pre-commit.yml

  helm-diff:
    needs: detect
    if: needs.detect.outputs.authorized == 'true' && needs.detect.outputs.helm == 'true'
    uses: ./.github/workflows/helm-diff.yml
    secrets: inherit

  docker-verify:
    needs: detect
    if: needs.detect.outputs.authorized == 'true' && needs.detect.outputs.docker-only == 'true'
    uses: ./.github/workflows/pull-image.yml
    secrets: inherit

  gate:
    runs-on: ubuntu-latest
    if: always()
    needs: [detect, pre-commit, helm-diff, docker-verify]
    steps:
      - name: Evaluate results
        run: |
          DETECT="${{ needs.detect.result }}"
          PRECOMMIT="${{ needs.pre-commit.result }}"
          HELM="${{ needs.helm-diff.result }}"
          DOCKER="${{ needs.docker-verify.result }}"

          echo "detect=$DETECT pre-commit=$PRECOMMIT helm-diff=$HELM docker-verify=$DOCKER"

          if [[ "$DETECT" == "failure" || "$PRECOMMIT" == "failure" || "$HELM" == "failure" || "$DOCKER" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi

          echo "CI passed"
