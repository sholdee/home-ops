---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.author.outputs.authorized }}
      gitops: ${{ steps.paths.outputs.gitops }}
    steps:
      - name: Check PR author
        id: author
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          AUTHORIZED_USERS=("sholdee" "pull-bunyan[bot]")
          AUTHORIZED=false

          for user in "${AUTHORIZED_USERS[@]}"; do
            if [[ "${user}" == "${PR_AUTHOR}" ]]; then
              AUTHORIZED=true
              break
            fi
          done

          echo "authorized=${AUTHORIZED}" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            gitops:
              - '.github/workflows/drydock-gitops.yml'
              - 'apps/**'
              - 'components/**'

  pre-commit:
    uses: ./.github/workflows/pre-commit.yml

  bootstrap-test:
    uses: ./.github/workflows/bootstrap-test.yml

  drydock-gitops:
    needs: detect
    if: needs.detect.outputs.authorized == 'true' && needs.detect.outputs.gitops == 'true'
    uses: ./.github/workflows/drydock-gitops.yml
    secrets: inherit

  gate:
    runs-on: ubuntu-latest
    if: always()
    needs: [detect, pre-commit, bootstrap-test, drydock-gitops]
    steps:
      - name: Evaluate results
        run: |
          DETECT="${{ needs.detect.result }}"
          PRECOMMIT="${{ needs.pre-commit.result }}"
          BOOTSTRAP="${{ needs.bootstrap-test.result }}"
          DRYDOCK="${{ needs.drydock-gitops.result }}"

          echo "detect=$DETECT pre-commit=$PRECOMMIT bootstrap-test=$BOOTSTRAP drydock-gitops=$DRYDOCK"

          if [[ "$DETECT" == "failure" || "$PRECOMMIT" == "failure" || "$BOOTSTRAP" == "failure" || "$DRYDOCK" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi

          echo "CI passed"
