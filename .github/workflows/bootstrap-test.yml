---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Bootstrap Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  bootstrap-test:
    runs-on: ubuntu-latest
    env:
      BOOTSTRAP_TEST_JOBS: "8"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install mise toolchain
        uses: ./.github/actions/setup-mise
        with:
          profile: bootstrap-test

      - name: Check justfile formatting
        run: just --fmt --check

      - name: List just tasks
        run: just --list

      - name: Check aggregate task wiring
        run: just --dry-run check

      - name: Run GitHub script tests
        run: just github-test

      - name: Show runner yq
        run: yq --version

      - name: Smoke render app helper
        run: just --quiet app-build adguard >/tmp/adguard.yaml

      - name: Verify app helper rejects path arguments
        run: |
          if just --quiet app-build ..; then
            echo "app-build accepted a path-like app argument" >&2
            exit 1
          fi

      - name: Check bootstrap test wiring
        run: just --dry-run bootstrap-test

      - name: Run bootstrap ShellCheck
        run: just bootstrap-shellcheck

      - name: Run bootstrap Bats
        run: just bootstrap-bats
