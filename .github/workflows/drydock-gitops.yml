---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Drydock GitOps

on:
  workflow_call:
    secrets:
      BOT_APP_CLIENT_ID:
        required: false
      BOT_APP_ID:
        required: false
      BOT_APP_PRIVATE_KEY:
        required: false

jobs:
  drydock-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      HAS_DIFF: ${{ steps.drydock.outputs.has-diff }}
      HAS_IMAGES: ${{ steps.drydock.outputs.has-images }}
      DIFF_ARTIFACT_NAME: ${{ steps.drydock.outputs.diff-artifact-name }}
      IMAGE_ARTIFACT_NAME: ${{ steps.drydock.outputs.image-artifact-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install mise toolchain
        uses: ./.github/actions/setup-mise
        with:
          profile: drydock

      - name: Run drydock pull request validation
        id: drydock
        uses: sholdee/drydock/pr-action@44517ae22ae64618dc8e4104e94a5a25c47b5e79 # v0.1.18
        with:
          checkout: "false"
          install: "false"
          drydock-bin: drydock
          github-app-client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          github-app-id: ${{ secrets.BOT_APP_ID }}
          github-app-private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          changed-only-include: |
            apps/**
            components/**
          comment-mode: diff

  verify-new-images:
    needs: drydock-diff
    if: needs.drydock-diff.outputs.HAS_IMAGES == 'true'
    runs-on: [self-hosted, Linux, ARM64, home-ops, image-pull]
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      HAS_BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID != '' }}
      HAS_BOT_APP_ID: ${{ secrets.BOT_APP_ID != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download rendered image diff
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.drydock-diff.outputs.IMAGE_ARTIFACT_NAME }}

      - name: Install mise toolchain
        uses: ./.github/actions/setup-mise
        with:
          profile: image

      - name: Attempt to pull images and verify platform
        run: |
          : > pull_results.txt
          PULL_FAILED=0

          while IFS= read -r IMAGE_FULL; do
            [ -n "${IMAGE_FULL}" ] || continue

            echo "Pulling image for linux/arm64: ${IMAGE_FULL}"
            PULL_STATUS="❌"
            PLATFORM_STATUS="ℹ️"

            if sudo /usr/local/bin/home-ops-crictl pull "${IMAGE_FULL}"; then
              PULL_STATUS="✅"

              INSPECT_JSON="$(sudo /usr/local/bin/home-ops-crictl inspecti -o json "${IMAGE_FULL}" || true)"
              if [ -n "${INSPECT_JSON}" ]; then
                ARCH="$(printf '%s' "${INSPECT_JSON}" | jq -r '.info.imageSpec.architecture // .imageSpec.architecture // empty')"
                OS="$(printf '%s' "${INSPECT_JSON}" | jq -r '.info.imageSpec.os // .imageSpec.os // empty')"

                if [ "${ARCH}" = "arm64" ] && [ "${OS}" = "linux" ]; then
                  PLATFORM_STATUS="✅"
                else
                  PLATFORM_STATUS="❌"
                  echo "Platform mismatch for ${IMAGE_FULL}: expected linux/arm64, got ${OS:-unknown}/${ARCH:-unknown}"
                  PULL_FAILED=1
                fi
              else
                PLATFORM_STATUS="❌"
                echo "Failed to inspect image metadata for ${IMAGE_FULL}"
                PULL_FAILED=1
              fi
            else
              echo "Failed to pull ${IMAGE_FULL}"
              PULL_FAILED=1
            fi

            printf "%s\t%s\t%s\n" "${PULL_STATUS}" "${PLATFORM_STATUS}" "${IMAGE_FULL}" >> pull_results.txt
          done < added-images.txt

          if [ "${PULL_FAILED}" -ne 0 ]; then
            exit 1
          fi

      - name: Format image pull status
        if: always()
        run: |
          if [ ! -s pull_results.txt ]; then
            echo "No image pull results were produced. Skipping PR comment."
            exit 0
          fi

          {
            echo "IMAGE_PULL_COMMENT<<EOF"
            echo "| Pulled | Platform | Image |"
            echo "|--------|----------|-------|"
            while IFS=$'\t' read -r PULLED PLATFORM IMG; do
              echo "| ${PULLED} | ${PLATFORM} | \`${IMG}\` |"
            done < pull_results.txt
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Generate Token
        if: always() && env.IMAGE_PULL_COMMENT != ''
          && env.HAS_BOT_APP_CLIENT_ID == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token-client
        with:
          client-id: "${{ secrets.BOT_APP_CLIENT_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
          permission-issues: write
          permission-pull-requests: write

      - name: Generate Token from legacy App ID
        if: always() && env.IMAGE_PULL_COMMENT != ''
          && env.HAS_BOT_APP_CLIENT_ID != 'true'
          && env.HAS_BOT_APP_ID == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token-legacy
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
          permission-issues: write
          permission-pull-requests: write

      - name: Add image pull comment
        if: always() && env.IMAGE_PULL_COMMENT != ''
        continue-on-error: true
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3.11
        with:
          repo-token: "${{ steps.app-token-client.outputs.token || steps.app-token-legacy.outputs.token || github.token }}"
          message-id: "${{ github.event.pull_request.number }}/pull-results"
          message: |
            ${{ env.IMAGE_PULL_COMMENT }}
