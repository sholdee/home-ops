---
# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Setup mise toolchain
description: Install the locked repository toolchain with mise

inputs:
  profile:
    description: Tool profile to install. One of all, validation, bootstrap-test, drydock, image, operator.
    default: all
  cache:
    description: >-
      Restore and save the mise tools cache via actions/cache. Set to "false" on
      persistent self-hosted runners, where the toolchain already persists on
      local disk and the remote cache restore is redundant.
    default: "true"

runs:
  using: composite
  steps:
    - name: Resolve mise profile
      id: profile
      shell: bash
      env:
        MISE_PROFILE: ${{ inputs.profile }}
      run: |
        set -euo pipefail

        case "${MISE_PROFILE}" in
          all)
            tools=(
              just lefthook oxfmt shellcheck bats rush actionlint kubeconform jsonschema zizmor gitleaks
              kubectl argocd github:cloudnative-pg/cloudnative-pg kustomize helm yq jq
              github:sholdee/drydock ansible-core pipx:ansible-lint kind lima op gh
            )
            ;;
          validation)
            tools=(
              lefthook oxfmt shellcheck actionlint kubeconform jsonschema zizmor gitleaks
              kustomize helm yq jq ansible-core pipx:ansible-lint
            )
            ;;
          bootstrap-test)
            tools=(python just shellcheck bats rush actionlint zizmor yq jq kustomize helm ansible-core)
            ;;
          drydock)
            tools=(github:sholdee/drydock jq)
            ;;
          image)
            tools=(jq)
            ;;
          operator)
            tools=(kubectl argocd github:cloudnative-pg/cloudnative-pg)
            ;;
          *)
            echo "unsupported mise profile: ${MISE_PROFILE}" >&2
            exit 1
            ;;
        esac

        printf 'tools=%s\n' "${tools[*]}" >> "${GITHUB_OUTPUT}"

    - name: Restore mise tools cache
      id: mise-cache
      if: inputs.cache == 'true'
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.cache/mise
          ~/.local/share/mise
        key: mise-${{ runner.os }}-${{ runner.arch }}-${{ inputs.profile }}-${{ hashFiles('mise.toml', 'mise.lock', '.github/actions/setup-mise/action.yml') }}
        restore-keys: |
          mise-${{ runner.os }}-${{ runner.arch }}-${{ inputs.profile }}-

    - name: Setup mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      with:
        install: false
        install_args: ${{ steps.profile.outputs.tools }}
        cache: false
        experimental: true
        github_token: ${{ github.token }}

    - name: Update mise binary
      shell: bash
      run: mise self-update --yes --no-plugins

    - name: Install locked toolchain
      shell: bash
      env:
        HOME_OPS_MISE_TOOLS: ${{ steps.profile.outputs.tools }}
      run: |
        set -euo pipefail
        read -r -a tools <<< "${HOME_OPS_MISE_TOOLS}"

        requires_pipx=false
        for tool in "${tools[@]}"; do
          if [[ "${tool}" == "pipx" || "${tool}" == pipx:* ]]; then
            requires_pipx=true
          fi
        done

        if [[ "${requires_pipx}" == "true" ]]; then
          mise install --locked --yes python pipx
          mise reshim
        fi

        mise install --locked --yes "${tools[@]}"
        mise reshim

    - name: Save mise tools cache
      if: inputs.cache == 'true' && steps.mise-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.cache/mise
          ~/.local/share/mise
        key: mise-${{ runner.os }}-${{ runner.arch }}-${{ inputs.profile }}-${{ hashFiles('mise.toml', 'mise.lock', '.github/actions/setup-mise/action.yml') }}

    - name: Verify mise toolchain
      shell: bash
      env:
        HOME_OPS_MISE_TOOLS: ${{ steps.profile.outputs.tools }}
      run: |
        set -euo pipefail
        read -r -a tools <<< "${HOME_OPS_MISE_TOOLS}"

        missing="$(mise ls --missing --current --no-header "${tools[@]}")"
        if [[ -n "${missing}" ]]; then
          echo "missing mise tools after install:" >&2
          echo "${missing}" >&2
          exit 1
        fi

        mise ls --installed --current --no-header "${tools[@]}"
