[tools]
# Core validation and command UX.
python = "3.14"
just = "1.51.0"
pipx = "1.12.0"
"pipx:pre-commit" = "4.6.0"
shellcheck = "0.11.0"
bats = "1.13.0"
actionlint = "1.7.12"
kubeconform = "0.7.0"

# Kubernetes and GitOps CLIs.
kubectl = "1.36.1"
argocd = "3.4.2"
"github:cloudnative-pg/cloudnative-pg[exe=kubectl-cnpg]" = "1.29.1"
kustomize = "5.8.1"
helm = "3.21.0"
yq = "4.53.2"
jq = "1.8.1"
"aqua:sholdee/crd-schema-publisher" = "2026.519.317"
"github:sholdee/drydock[exe=drydock]" = "v0.1.2"

# Bootstrap, node lifecycle, and operator workflow CLIs.
ansible-core = "2.21.0"
"pipx:ansible-lint" = "26.4.0"
kind = "0.31.0"
lima = "2.1.1"
op = "2.34.0"
gh = "2.92.0"
