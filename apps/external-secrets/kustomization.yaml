---
# yaml-language-server: $schema=https://kube-schemas.shold.io/kustomize.config.k8s.io/kustomization_v1beta1.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-secrets
components:
  - ../../components/namespace
resources:
  - manifests/clustersecretstore.yaml
  - manifests/namespace.yaml
helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.8.0
    releaseName: external-secrets
    namespace: external-secrets
    valuesFile: manifests/values.yaml
  - name: connect
    repo: https://1password.github.io/connect-helm-charts
    version: 2.4.1
    releaseName: 1password-connect
    namespace: external-secrets
    valuesFile: manifests/values-op.yaml
patches:
  - target:
      kind: Deployment
      name: onepassword-connect
    patch: |-
      - op: add
        path: /spec/strategy
        value:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 0
            maxUnavailable: 1
