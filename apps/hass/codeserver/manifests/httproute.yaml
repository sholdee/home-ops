---
# yaml-language-server: $schema=https://kube-schemas.shold.io/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: codeserver
  namespace: hass
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: gateway
  hostnames:
    - codeserver.mgmt.sholdee.net
  rules:
    - backendRefs:
        - name: codeserver
          namespace: hass
          port: 8080
