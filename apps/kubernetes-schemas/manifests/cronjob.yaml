---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubernetes-schemas
  namespace: kubernetes-schemas
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      template:
        spec:
          serviceAccountName: kubernetes-schemas
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: crd-schema-publisher
              image: ghcr.io/sholdee/crd-schema-publisher:v2026.0409.054605@sha256:f634cea33a48e32aa04eb66338a63f3bc58e6fc52ced31d3f247824a5ad4e3fa
              env:
                - name: CLOUDFLARE_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cloudflare-credentials
                      key: CLOUDFLARE_API_TOKEN
                - name: CLOUDFLARE_ACCOUNT_ID
                  valueFrom:
                    secretKeyRef:
                      name: cloudflare-credentials
                      key: CLOUDFLARE_ACCOUNT_ID
                - name: CF_PAGES_PROJECT
                  value: kubernetes-schemas
                - name: OUTPUT_DIR
                  value: /output
              resources:
                requests:
                  cpu: 50m
                  memory: 1Gi
                limits:
                  cpu: 500m
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: output
                  mountPath: /output
          volumes:
            - name: output
              emptyDir: {}
