---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-schemas
  namespace: kubernetes-schemas
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: kubernetes-schemas
  template:
    metadata:
      labels:
        app: kubernetes-schemas
    spec:
      serviceAccountName: kubernetes-schemas
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: crd-schema-publisher
          image: ghcr.io/sholdee/crd-schema-publisher:v2026.0413.054329@sha256:f4462a688e4ae8f0443ff33eef0a33ea7ce669560f68e4060c1a72bd74b5137d
          args:
            - watch
          env:
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-credentials
                  key: CLOUDFLARE_API_TOKEN
            - name: CLOUDFLARE_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: cloudflare-credentials
                  key: CLOUDFLARE_ACCOUNT_ID
            - name: CF_PAGES_PROJECT
              value: kubernetes-schemas
            - name: OUTPUT_DIR
              value: /output
            - name: DEBOUNCE_SECONDS
              value: "15"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 500Mi
            limits:
              cpu: 500m
              memory: 500Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: output
              mountPath: /output
      volumes:
        - name: output
          emptyDir: {}
