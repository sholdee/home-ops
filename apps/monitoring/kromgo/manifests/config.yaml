---
# yaml-language-server: $schema=https://raw.githubusercontent.com/home-operations/kromgo/0.15.0/config.schema.json
cache:
  enabled: true
  maxAge: 60
defaults:
  badge:
    gallery:
      hidden: true
  graph:
    theme: catppuccin-latte
    width: 600
    height: 180
    legend: false
    fill: true
    maxDuration: 30d
    gallery:
      hidden: true
badges:
  - id: kubernetes_version
    query: max by(git_version) (kubernetes_build_info{job="k3s-server"})
    valueExpr: 'labels[?"git_version"].orValue("unknown")'
    colorExpr: '"blue"'
    style: for-the-badge
    icon: si:kubernetes
  - id: cluster_node_count
    query: count(kube_node_info)
    valueExpr: "humanizeCommas(result)"
    colorExpr: '"green"'
    style: flat-square
    title: Nodes
    icon: mdi:server
  - id: cluster_pod_count
    query: sum(kube_pod_info)
    valueExpr: "humanizeCommas(result)"
    colorExpr: '"green"'
    style: flat-square
    title: Pods
    icon: mdi:cube-outline
  - id: cluster_cpu_usage
    query: round(avg(100 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance) * 100), 0.01)
    valueExpr: 'humanizeFloat(result) + "%"'
    colorExpr: 'result <= 35.0 ? "green" : result <= 75.0 ? "orange" : "red"'
    style: flat-square
    title: CPU
    icon: mdi:cpu-64-bit
  - id: cluster_memory_usage
    query: round((sum(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) * 100, 0.1)
    valueExpr: 'humanizeFloat(result) + "%"'
    colorExpr: 'result <= 75.0 ? "green" : result <= 85.0 ? "orange" : "red"'
    style: flat-square
    title: Memory
    icon: mdi:memory
  - id: cluster_age_days
    query: round((time() - max(kube_namespace_created{namespace="kube-system"})) / 86400)
    valueExpr: 'humanizeFloat(result) + "d"'
    colorExpr: '"green"'
    style: flat-square
    title: Age
    icon: mdi:calendar-clock
  - id: cluster_uptime_days
    query: round(avg(node_time_seconds - node_boot_time_seconds) / 86400)
    valueExpr: 'humanizeFloat(result) + "d"'
    colorExpr: 'result <= 180.0 ? "green" : result <= 360.0 ? "orange" : "red"'
    style: flat-square
    title: Uptime
    icon: mdi:timer-outline
  - id: argocd_health
    query: count(argocd_app_info{health_status!="Healthy", name!="cilium-preflight"}) or vector(0)
    valueExpr: 'result == 0.0 ? "healthy" : humanizeFloat(result) + " degraded"'
    colorExpr: 'result == 0.0 ? "green" : "red"'
    style: flat-square
    title: Apps
    icon: si:argo
  - id: alerts_firing
    query: count(ALERTS{alertstate="firing", alertname!~"Watchdog|InfoInhibitor"}) or vector(0)
    valueExpr: 'result == 0.0 ? "0 firing" : humanizeFloat(result) + " firing"'
    colorExpr: 'result == 0.0 ? "green" : "red"'
    style: flat-square
    title: Alerts
    icon: mdi:bell-alert
  - id: cert_expiry
    query: round((min(certmanager_certificate_expiration_timestamp_seconds) - time()) / 86400)
    valueExpr: 'humanizeFloat(result) + "d"'
    colorExpr: 'colorScale(result, [7.0, 21.0], ["red", "orange", "green"])'
    style: flat-square
    title: Certs
    icon: mdi:certificate
  - id: storage_usage
    query: round(sum(longhorn_node_storage_usage_bytes) / sum(longhorn_node_storage_capacity_bytes) * 100, 0.1)
    valueExpr: 'humanizeFloat(result) + "%"'
    colorExpr: 'colorScale(result, [70.0, 85.0], ["green", "orange", "red"])'
    style: flat-square
    title: Storage
    icon: mdi:harddisk
  - id: node_temp_k3s_master_0
    query: round(max(node_hwmon_temp_celsius * on(instance) group_left() node_uname_info{nodename="k3s-master-0"}))
    valueExpr: 'humanizeFloat(result) + "°C"'
    colorExpr: 'colorScale(result, [65.0, 80.0], ["green", "orange", "red"])'
    style: flat-square
    icon: mdi:thermometer
  - id: node_temp_k3s_master_1
    query: round(max(node_hwmon_temp_celsius * on(instance) group_left() node_uname_info{nodename="k3s-master-1"}))
    valueExpr: 'humanizeFloat(result) + "°C"'
    colorExpr: 'colorScale(result, [65.0, 80.0], ["green", "orange", "red"])'
    style: flat-square
    icon: mdi:thermometer
  - id: node_temp_k3s_master_2
    query: round(max(node_hwmon_temp_celsius * on(instance) group_left() node_uname_info{nodename="k3s-master-2"}))
    valueExpr: 'humanizeFloat(result) + "°C"'
    colorExpr: 'colorScale(result, [65.0, 80.0], ["green", "orange", "red"])'
    style: flat-square
    icon: mdi:thermometer
  - id: node_temp_k3s_worker_0
    query: round(max(node_hwmon_temp_celsius * on(instance) group_left() node_uname_info{nodename="k3s-worker-0"}))
    valueExpr: 'humanizeFloat(result) + "°C"'
    colorExpr: 'colorScale(result, [65.0, 80.0], ["green", "orange", "red"])'
    style: flat-square
    icon: mdi:thermometer
  - id: node_temp_k3s_worker_1
    query: round(max(node_hwmon_temp_celsius * on(instance) group_left() node_uname_info{nodename="k3s-worker-1"}))
    valueExpr: 'humanizeFloat(result) + "°C"'
    colorExpr: 'colorScale(result, [65.0, 80.0], ["green", "orange", "red"])'
    style: flat-square
    icon: mdi:thermometer
graphs:
  - id: cpu_trend
    query: avg(100 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance) * 100)
    title: CPU Usage
    valueExpr: 'string(int(result)) + "%"'
    yMin: 0
    yMax: 100
    markLine: [average]
  - id: pods_trend
    query: sum(kube_pod_status_phase{phase="Running"})
    title: Running Pods
    valueExpr: "string(int(result))"
    markLine: [average]
