---
# yaml-language-server: $schema=https://kube-schemas.shold.io/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kromgo
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app: kromgo
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: envoy-gateway-system
            gateway.envoyproxy.io/owning-gateway-name: external-gateway
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
          rules:
            http:
              - method: GET
                path: '^/badges/kubernetes_version(\?format=shields)?$'
              - method: GET
                path: '^/badges/cluster_node_count(\?format=shields)?$'
              - method: GET
                path: '^/badges/cluster_pod_count(\?format=shields)?$'
              - method: GET
                path: '^/badges/cluster_cpu_usage(\?format=shields)?$'
              - method: GET
                path: '^/badges/cluster_memory_usage(\?format=shields)?$'
              - method: GET
                path: '^/badges/cluster_age_days(\?format=shields)?$'
              - method: GET
                path: '^/badges/cluster_uptime_days(\?format=shields)?$'
              # health badges
              - method: GET
                path: "^/badges/argocd_health$"
              - method: GET
                path: "^/badges/alerts_firing$"
              - method: GET
                path: "^/badges/cert_expiry$"
              - method: GET
                path: "^/badges/storage_usage$"
              # per-node temperature badges
              - method: GET
                path: "^/badges/node_temp_k3s_master_0$"
              - method: GET
                path: "^/badges/node_temp_k3s_master_1$"
              - method: GET
                path: "^/badges/node_temp_k3s_master_2$"
              - method: GET
                path: "^/badges/node_temp_k3s_worker_0$"
              - method: GET
                path: "^/badges/node_temp_k3s_worker_1$"
              # 7-day trend graphs (range queries; allow ?last=…&theme=… params)
              - method: GET
                path: '^/graphs/cpu_trend(\?.*)?$'
              - method: GET
                path: '^/graphs/pods_trend(\?.*)?$'
