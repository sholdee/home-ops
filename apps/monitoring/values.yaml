crds:
  enabled: false
  upgradeJob:
    enabled: false
defaultRules:
  disabled:
    KubeAPIDown: true
    KubeAPIInstanceUnreachable: true
    KubeControllerManagerDown: true
    KubeControllerManagerInstanceUnreachable: true
    KubeSchedulerDown: true
    KubeSchedulerInstanceUnreachable: true
prometheus:
  prometheusSpec:
    replicas: 2
    image:
      # renovate: datasource=docker depName=ghcr.io/deckhouse/prompp digest=sha256:ff61bc7b1df0637c42dd1d78dee9106e3ad05aa1b4ee7263f0dab91c1e12c19b
      registry: ghcr.io
      repository: deckhouse/prompp
      tag: "0.8.1"
      sha: ff61bc7b1df0637c42dd1d78dee9106e3ad05aa1b4ee7263f0dab91c1e12c19b
      pullPolicy: IfNotPresent
    # Keep < 3.11.0: at >= 3.11.0 prometheus-operator writes storage.tsdb.retention into
    # the config file, but prompp 0.8.0's parser has no such field (err: "field retention
    # not found in type config.plain") -- below 3.11.0 the operator uses the
    # --storage.tsdb.retention.time flag instead, which prompp accepts. Revisit if a
    # prompp release adds storage.tsdb.retention config support.
    version: v3.10.0
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    externalUrl: "https://prometheus.mgmt.sholdee.net"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 25Gi
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        memory: 1280Mi
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
alertmanager:
  alertmanagerSpec:
    useExistingSecret: true
    configSecret: alertmanager-secret
    externalUrl: "https://alertmgr.mgmt.sholdee.net"
    replicas: 3
    podAntiAffinity: "soft"
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
grafana:
  enabled: false
  forceDeployDashboards: true
  operator:
    dashboardsConfigMapRefEnabled: true
    matchLabels:
      dashboards: grafana
kubelet:
  enabled: true
  jobNameOverride: k3s-server
  serviceMonitor:
    relabelings:
      - targetLabel: job
        replacement: k3s-server
        action: replace
      # Fix default kubelet dashboard using wrong instance label value
      - sourceLabels:
          [
            __meta_kubernetes_endpoint_address_target_kind,
            __meta_kubernetes_endpoint_address_target_name,
          ]
        regex: Node;(.*)
        targetLabel: node
        action: replace
      - sourceLabels: ["node"]
        targetLabel: instance
        action: replace
      - sourceLabels: [__metrics_path__]
        targetLabel: metrics_path
        action: replace
    cAdvisorRelabelings:
      - targetLabel: job
        replacement: k3s-server
        action: replace
      - sourceLabels: [__metrics_path__]
        targetLabel: metrics_path
        action: replace
    probesRelabelings:
      - targetLabel: job
        replacement: k3s-server
        action: replace
      - sourceLabels: [__metrics_path__]
        targetLabel: metrics_path
        action: replace
    metricRelabelings:
      - action: replace
        sourceLabels: ["node"]
        targetLabel: instance
      # Drop high cardinality labels
      - action: labeldrop
        regex: (uid)
      - action: labeldrop
        regex: (id|name)
      - action: drop
        sourceLabels: ["__name__"]
        regex: (apiserver_request_duration_seconds_bucket|apiserver_request_slo_duration_seconds_bucket|etcd_request_duration_seconds_bucket)
      - action: drop
        sourceLabels: ["__name__"]
        regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)
      - action: drop
        sourceLabels: ["__name__"]
        regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
kubeApiServer:
  enabled: true
  jobNameOverride: k3s-server
  serviceMonitor:
    enabled: false
kubeEtcd:
  enabled: true
  endpoints:
    - 192.168.99.10
    - 192.168.99.11
    - 192.168.99.12
kubeControllerManager:
  enabled: true
  jobNameOverride: k3s-server
  service:
    enabled: false
  serviceMonitor:
    enabled: false
kubeScheduler:
  enabled: true
  jobNameOverride: k3s-server
  service:
    enabled: false
  serviceMonitor:
    enabled: false
kubeProxy:
  enabled: false
