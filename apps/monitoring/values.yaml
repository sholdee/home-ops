crds:
  enabled: false
  upgradeJob:
    enabled: false
defaultRules:
  disabled:
    KubeAPIDown: true
    KubeAPIInstanceUnreachable: true
    KubeControllerManagerDown: true
    KubeControllerManagerInstanceUnreachable: true
    KubeSchedulerDown: true
    KubeSchedulerInstanceUnreachable: true
prometheus:
  prometheusSpec:
    replicas: 2
    image:
      registry: docker.io
      repository: sholdee/prompp
      tag: "0.7.10-jemalloc-aarch64-fix-arm64"
      sha: df1285d2da16952348de8b094f5332cb68b8241399941b6c2c7c3dc03b284481
      pullPolicy: IfNotPresent
    version: v3.11.3
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    externalUrl: "https://prometheus.mgmt.sholdee.net"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 25Gi
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        memory: 1280Mi
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
alertmanager:
  alertmanagerSpec:
    useExistingSecret: true
    configSecret: alertmanager-secret
    externalUrl: "https://alertmgr.mgmt.sholdee.net"
    replicas: 3
    podAntiAffinity: "soft"
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
grafana:
  enabled: false
  forceDeployDashboards: true
  operator:
    dashboardsConfigMapRefEnabled: true
    matchLabels:
      dashboards: grafana
kubelet:
  enabled: true
  jobNameOverride: k3s-server
  serviceMonitor:
    relabelings:
      - targetLabel: job
        replacement: k3s-server
        action: replace
      # Fix default kubelet dashboard using wrong instance label value
      - sourceLabels:
          [
            __meta_kubernetes_endpoint_address_target_kind,
            __meta_kubernetes_endpoint_address_target_name,
          ]
        regex: Node;(.*)
        targetLabel: node
        action: replace
      - sourceLabels: ["node"]
        targetLabel: instance
        action: replace
      - sourceLabels: [__metrics_path__]
        targetLabel: metrics_path
        action: replace
    cAdvisorRelabelings:
      - targetLabel: job
        replacement: k3s-server
        action: replace
      - sourceLabels: [__metrics_path__]
        targetLabel: metrics_path
        action: replace
    probesRelabelings:
      - targetLabel: job
        replacement: k3s-server
        action: replace
      - sourceLabels: [__metrics_path__]
        targetLabel: metrics_path
        action: replace
    metricRelabelings:
      - action: replace
        sourceLabels: ["node"]
        targetLabel: instance
      # Drop high cardinality labels
      - action: labeldrop
        regex: (uid)
      - action: labeldrop
        regex: (id|name)
      - action: drop
        sourceLabels: ["__name__"]
        regex: (apiserver_request_duration_seconds_bucket|apiserver_request_slo_duration_seconds_bucket|etcd_request_duration_seconds_bucket)
      - action: drop
        sourceLabels: ["__name__"]
        regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)
      - action: drop
        sourceLabels: ["__name__"]
        regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
kubeApiServer:
  enabled: true
  jobNameOverride: k3s-server
  serviceMonitor:
    enabled: false
kubeEtcd:
  enabled: true
  endpoints:
    - 192.168.99.10
    - 192.168.99.11
    - 192.168.99.12
kubeControllerManager:
  enabled: true
  jobNameOverride: k3s-server
  service:
    enabled: false
  serviceMonitor:
    enabled: false
kubeScheduler:
  enabled: true
  jobNameOverride: k3s-server
  service:
    enabled: false
  serviceMonitor:
    enabled: false
kubeProxy:
  enabled: false
