apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-landing
  namespace: unifi
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  selector:
    matchLabels:
      app: unifi-landing
  template:
    metadata:
      labels:
        app: unifi-landing
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: unifi-landing
          image: caddy:2.11.4@sha256:cb9d71ad83182011b79355cd57692686374bd78d6fe327efe0ff8507da03ab13
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
          volumeMounts:
            - mountPath: /etc/caddy
              name: unifi-landing
            - mountPath: /var/www
              name: unifi-landing-static
            - mountPath: /config/caddy
              name: tmp
              subPath: conf
            - mountPath: /data/caddy
              name: tmp
              subPath: data
          resources:
            requests:
              memory: 10Mi
              cpu: "5m"
            limits:
              memory: 50Mi
          livenessProbe: &probe
            httpGet:
              path: /landing
              port: http
          readinessProbe: *probe
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
      volumes:
        - emptyDir: {}
          name: tmp
        - name: unifi-landing
          configMap:
            name: unifi-landing
        - name: unifi-landing-static
          configMap:
            name: unifi-landing-static
