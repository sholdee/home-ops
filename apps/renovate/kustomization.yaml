---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: renovate
resources:
  - manifests/externalsecret.yaml
  - manifests/renovatejob.yaml
  - manifests/httproute.yaml
  - manifests/redis.yaml
  - manifests/netpol.yaml
components:
  - ../../components/namespace
helmCharts:
  - name: renovate-operator
    repo: oci://ghcr.io/mogenius/helm-charts
    version: 4.6.0
    releaseName: renovate-operator
    namespace: renovate
    valuesFile: manifests/values.yaml
patches:
  - target:
      kind: GrafanaDashboard
      name: renovate-operator-dashboard
    patch: |-
      - op: replace
        path: /metadata/name
        value: renovate-operator-dashboard-grafana
      - op: replace
        path: /spec/instanceSelector
        value:
          matchLabels:
            dashboards: grafana
