---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: renovate
spec:
  discoveryFilter: "/sholdee/(docker-compose|caddy-proxy-cloudflare|adguard-exporter|home-ops)/"
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
    - name: NODE_OPTIONS
      value: "--max-old-space-size=1024"
  provider:
    name: github
  image: renovate/renovate:43.84.1
  parallelism: 3
  schedule: "0 * * * *"
  secretRef: renovate-secret
  resources:
    requests:
      cpu: 400m
      memory: 1280Mi
    limits:
      cpu: 400m
      memory: 1280Mi
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-token
        key: token
