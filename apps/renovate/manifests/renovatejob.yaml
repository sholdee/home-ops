---
# yaml-language-server: $schema=https://kube-schemas.shold.io/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: renovate
spec:
  discoveryFilters:
    [
      "/sholdee/(docker-compose|caddy-proxy-cloudflare|adguard-exporter|crd-schema-publisher|home-ops)/",
    ]
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
    - name: NODE_OPTIONS
      value: "--max-old-space-size=1536"
    - name: RENOVATE_REDIS_URL
      valueFrom:
        secretKeyRef:
          name: renovate-dragonfly-auth
          key: RENOVATE_REDIS_URL
    - name: RENOVATE_REPOSITORY_CACHE
      value: enabled
    - name: RENOVATE_REPOSITORY_CACHE_TYPE
      value: "s3://renovate-cache"
    - name: AWS_REGION
      value: garage
    - name: AWS_ENDPOINT_URL
      value: "http://10.2.0.110:3900"
    - name: S3_FORCE_PATH_STYLE
      value: "true"
  provider:
    name: github
  image: renovate/renovate:43.170.20@sha256:04a60fea88f50d31158902c24553fae748e97d5e1d7524ad7d6c69b874650065
  parallelism: 3
  schedule: "0 * * * *"
  secretRef: renovate-secret
  resources:
    requests:
      cpu: 500m
      memory: 2048Mi
    limits:
      cpu: 500m
      memory: 2048Mi
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-token
        key: token
