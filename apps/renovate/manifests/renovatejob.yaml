---
# yaml-language-server: $schema=https://kube-schemas.shold.io/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: renovate
spec:
  discoveryFilters:
    [
      "/sholdee/(docker-compose|caddy-proxy-cloudflare|adguard-exporter|home-ops)/",
    ]
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
    - name: NODE_OPTIONS
      value: "--max-old-space-size=1024"
    - name: RENOVATE_REDIS_URL
      value: "redis://renovate-redis.renovate.svc.cluster.local:6379"
    - name: RENOVATE_REPOSITORY_CACHE
      value: enabled
    - name: RENOVATE_REPOSITORY_CACHE_TYPE
      value: "s3://renovate-cache"
    - name: AWS_REGION
      value: garage
    - name: AWS_ENDPOINT_URL
      value: "http://10.2.0.110:3900"
    - name: S3_FORCE_PATH_STYLE
      value: "true"
  provider:
    name: github
  image: renovate/renovate:43.110.6@sha256:e3b964fea56eeec3710632c074886897981be3195cf7dc5c96d7662bc3adec64
  parallelism: 3
  schedule: "0 * * * *"
  secretRef: renovate-secret
  resources:
    requests:
      cpu: 500m
      memory: 1280Mi
    limits:
      cpu: 500m
      memory: 1280Mi
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-token
        key: token
