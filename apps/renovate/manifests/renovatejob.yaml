---
# yaml-language-server: $schema=https://kube-schemas.shold.io/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: renovate
spec:
  discoveryFilters:
    [
      "/sholdee/(docker-compose|caddy-proxy-cloudflare|adguard-exporter|crd-schema-publisher|home-ops|drydock)/",
    ]
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
    - name: NODE_OPTIONS
      value: "--max-old-space-size=1536"
    - name: RENOVATE_REDIS_URL
      valueFrom:
        secretKeyRef:
          name: renovate-dragonfly-auth
          key: RENOVATE_REDIS_URL
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-secret
          key: RENOVATE_TOKEN
    - name: RENOVATE_REPOSITORY_CACHE
      value: enabled
    - name: RENOVATE_REPOSITORY_CACHE_TYPE
      value: "s3://renovate-cache"
    - name: RENOVATE_SECRETS
      value: '{"MISE_GITHUB_TOKEN":"$(GITHUB_TOKEN)"}'
    - name: RENOVATE_CUSTOM_ENV_VARIABLES
      value: '{"MISE_TRUSTED_CONFIG_PATHS":"/tmp/repos/github/sholdee","MISE_GITHUB_TOKEN":"{{ secrets.MISE_GITHUB_TOKEN }}"}'
    - name: RENOVATE_ALLOWED_UNSAFE_EXECUTIONS
      value: '["mise"]'
    - name: RENOVATE_ALLOWED_COMMANDS
      value: '["^go run \\./scripts/sync-argocd-gitops-engine\\.go$","^mise lock --yes$"]'
    - name: AWS_REGION
      value: garage
    - name: AWS_ENDPOINT_URL
      value: "http://10.2.0.110:3900"
    - name: S3_FORCE_PATH_STYLE
      value: "true"
  provider:
    name: github
  image: renovate/renovate:43.272.6@sha256:b640a73476ded79cc9bb90fd69dff81876220f1c8a5c454fb7ddf23cd8d1e627
  parallelism: 3
  schedule: "0 * * * *"
  secretRef: renovate-secret
  resources:
    requests:
      cpu: 500m
      memory: 2048Mi
    limits:
      cpu: 500m
      memory: 2048Mi
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-webhook-token
        key: token
