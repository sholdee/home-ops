fullnameOverride: renovate-operator
webhook:
  enabled: true
config:
  jobTTLSecondsAfterFinished: 10800
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
  dashboard:
    enabled: true
    grafanaDashboard:
      allowCrossNamespaceImport: true
      instanceSelector:
        matchLabels:
          dashboards: grafana
      datasources:
        - inputName: datasource
          datasourceName: Prometheus
