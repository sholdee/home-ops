---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
components:
  - ../../components/namespace
  - ../../components/dragonfly
resources:
  - manifests/apps.yaml
  - manifests/app-project.yaml
  - manifests/app-set.yaml
  - manifests/repos.yaml
  - manifests/httproute.yaml
  - manifests/cilium-preflight.yaml
  - manifests/dragonfly-operator-rbac.yaml
  - manifests/namespace.yaml
  - manifests/netpol.yaml
  - manifests/externalsecret.yaml
patches:
  - target:
      group: dragonflydb.io
      version: v1alpha1
      kind: Dragonfly
      name: dragonfly
    patch: |-
      - op: add
        path: /spec/authentication
        value:
          passwordFromSecret:
            name: argocd-dragonfly-auth
            key: redis-password
helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 9.5.11
    releaseName: argocd
    namespace: argocd
    valuesFile: manifests/values.yaml
