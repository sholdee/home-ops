global:
  domain: argocd.sholdee.net
redis:
  enabled: false
redis-ha:
  enabled: false
redisSecretInit:
  enabled: false
externalRedis:
  host: dragonfly.argocd.svc.cluster.local
  port: 6379
  existingSecret: argocd-dragonfly-auth
server:
  replicas: 2
  env:
    - name: ARGOCD_API_SERVER_REPLICAS
      value: "2"
  pdb:
    enabled: true
    maxUnavailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
  certificate:
    enabled: false
  certificateSecret:
    enabled: false
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
controller:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
repoServer:
  replicas: 2
  pdb:
    enabled: true
    maxUnavailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
applicationSet:
  replicas: 2
  extraArgs:
    - --enable-leader-election=true
  pdb:
    enabled: true
    maxUnavailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
configs:
  cm:
    kustomize.buildOptions: --enable-helm --helm-api-versions grafana.integreatly.org/v1beta1/GrafanaDashboard
    resource.exclusions: |
     - apiGroups:
         - cilium.io
       kinds:
         - CiliumIdentity
       clusters:
         - "*"
    users.anonymous.enabled: "true"
  rbac:
    policy.default: 'role:readonly'
