---
# yaml-language-server: $schema=https://kube-schemas.shold.io/argoproj.io/applicationset_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k3s-apps
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/sholdee/home-ops
        revision: master
        directories:
          - path: "apps/*"
  template:
    metadata:
      name: "{{.path.basename}}"
      annotations:
        argocd.argoproj.io/compare-options: ServerSideDiff=true
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    spec:
      project: k3s
      source:
        repoURL: https://github.com/sholdee/home-ops
        targetRevision: master
        path: "{{.path.path}}"
      destination:
        name: in-cluster
        namespace: '{{ regexReplaceAll "-conf$" .path.basename "" }}'
      syncPolicy:
        automated:
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true
  templatePatch: |
    {{- if eq .path.basename "monitoring" }}
    spec:
      ignoreDifferences:
      - group: ''
        kind: Secret
        name: kube-prometheus-stack-grafana
        jsonPointers:
        - /data
      - group: 'apps'
        kind: StatefulSet
        name: kube-prometheus-stack-grafana
        jsonPointers:
        - /spec/template/metadata/annotations/checksum~1secret
    {{- end }}
