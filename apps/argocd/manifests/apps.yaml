---
# yaml-language-server: $schema=https://kube-schemas.shold.io/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  destination:
    name: in-cluster
    namespace: kube-system
  ignoreDifferences:
    - jsonPointers:
        - /data
      kind: Secret
      name: cilium-ca
    - jsonPointers:
        - /data
      kind: Secret
      name: hubble-ca-cert
    - jsonPointers:
        - /data
      kind: Secret
      name: hubble-relay-client-certs
    - jsonPointers:
        - /data
      kind: Secret
      name: hubble-server-certs
  project: k3s
  source:
    chart: cilium
    helm:
      releaseName: cilium
      valuesObject:
        cluster:
          name: k3s
          id: 7
        ipam:
          operator:
            clusterPoolIPv4PodCIDRList: "10.52.0.0/16"
        ipv4NativeRoutingCIDR: "10.52.0.0/16"
        k8sServiceHost: "127.0.0.1"
        k8sServicePort: "6444"
        routingMode: "native"
        autoDirectNodeRoutes: true
        kubeProxyReplacement: true
        bpf:
          masquerade: false
          datapathMode: "netkit"
          distributedLRU:
            enabled: true
          mapDynamicSizeRatio: 0.01
        bpfClockProbe: true
        bandwidthManager:
          enabled: true
          bbr: true
        loadBalancer:
          algorithm: "maglev"
          mode: "dsr"
        enableIPv4Masquerade: false
        bgpControlPlane:
          enabled: true
        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true
        installNoConntrackIptablesRules: true
        operator:
          replicas: 3
          prometheus:
            enabled: true
            serviceMonitor:
              enabled: true
          dashboards:
            enabled: true
        prometheus:
          enabled: true
          serviceMonitor:
            enabled: true
            trustCRDsExist: true
        dashboards:
          enabled: true
        gatewayAPI:
          enabled: true
          enableAlpn: true
    repoURL: https://helm.cilium.io/
    targetRevision: 1.19.3
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
---
# yaml-language-server: $schema=https://kube-schemas.shold.io/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crd-schema-publisher
spec:
  destination:
    name: in-cluster
    namespace: crd-schema-publisher
  project: k3s
  source:
    chart: crd-schema-publisher
    helm:
      releaseName: crd-schema-publisher
      valuesObject:
        annotations:
          reloader.stakater.com/auto: "true"
        externalSecret:
          enabled: true
          secretStoreRef:
            name: onepassword-connect
            kind: ClusterSecretStore
        metrics:
          podMonitor:
            enabled: true
          prometheusRule:
            enabled: true
        grafana:
          dashboard:
            enabled: false
            operator:
              enabled: true
              allowCrossNamespaceImport: true
              folder: General
              datasources:
                - inputName: DS_PROMETHEUS
                  datasourceName: Prometheus
    repoURL: ghcr.io/sholdee/charts
    targetRevision: 2026.505.230529
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
---
# yaml-language-server: $schema=https://kube-schemas.shold.io/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dragonfly-operator
spec:
  destination:
    name: in-cluster
    namespace: dragonfly-operator
  project: k3s
  source:
    chart: dragonfly-operator
    repoURL: ghcr.io/dragonflydb/dragonfly-operator/helm
    targetRevision: v1.5.0
    helm:
      releaseName: dragonfly-operator
      valuesObject:
        crds:
          install: true
          keep: true
        manager:
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
        serviceMonitor:
          enabled: true
          rbacProxyMetricsReader:
            create: true
            serviceAccountName: kube-prometheus-stack-prometheus
            serviceAccountNamespace: monitoring
        grafanaDashboard:
          enabled: true
          folder: General
          grafanaOperator:
            enabled: true
            allowCrossNamespaceImport: true
            matchLabels:
              dashboards: grafana
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - ServerSideApply=true
---
# yaml-language-server: $schema=https://kube-schemas.shold.io/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-operator
spec:
  destination:
    name: in-cluster
    namespace: monitoring
  project: k3s
  source:
    chart: grafana-operator
    repoURL: ghcr.io/grafana/helm-charts
    targetRevision: 5.22.2
    helm:
      releaseName: grafana-operator
      valuesObject:
        crds:
          immutable: false
        dashboard:
          enabled: true
        serviceMonitor:
          enabled: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
          fsGroup: 65534
          seccompProfile:
            type: RuntimeDefault
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - ServerSideApply=true
---
# yaml-language-server: $schema=https://kube-schemas.shold.io/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
spec:
  destination:
    name: in-cluster
    namespace: longhorn-system
  ignoreDifferences:
    - group: "*"
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields
  project: k3s
  source:
    chart: longhorn
    helm:
      valuesObject:
        defaultSettings:
          defaultDataLocality: best-effort
          concurrentAutomaticEngineUpgradePerNodeLimit: "2"
          nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
          nodeDrainPolicy: block-for-eviction-if-contains-last-replica
          replicaAutoBalance: best-effort
          backupTarget: "nfs://10.2.0.110:/volume1/longhorn"
          backupTargetCredentialSecret: ""
          backupstorePollInterval: "3600"
          removeSnapshotsDuringFilesystemTrim: "true"
        metrics:
          serviceMonitor:
            enabled: "true"
        networkPolicies:
          enabled: false
          type: "k3s"
    repoURL: https://charts.longhorn.io
    targetRevision: 1.11.2
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
---
# yaml-language-server: $schema=https://kube-schemas.shold.io/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reloader
spec:
  destination:
    name: in-cluster
    namespace: default
  project: k3s
  source:
    chart: reloader
    helm:
      valuesObject:
        fullnameOverride: reloader
        reloader:
          readOnlyRootFileSystem: true
          podMonitor:
            enabled: true
    repoURL: https://stakater.github.io/stakater-charts
    targetRevision: 2.2.11
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
---
# yaml-language-server: $schema=https://kube-schemas.shold.io/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volsync
spec:
  destination:
    name: in-cluster
    namespace: volsync-system
  project: k3s
  source:
    chart: volsync
    helm:
      valuesObject:
        replicaCount: 2
        manageCRDs: true
        metrics:
          disableAuth: true
    repoURL: https://backube.github.io/helm-charts/
    targetRevision: 0.15.0
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
