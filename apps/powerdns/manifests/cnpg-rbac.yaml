---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-backup-creds
  namespace: powerdns
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-backup-creds-binding
  namespace: powerdns
subjects:
  - kind: ServiceAccount
    name: powerdns-db
    namespace: powerdns
roleRef:
  kind: Role
  name: read-backup-creds
  apiGroup: rbac.authorization.k8s.io
