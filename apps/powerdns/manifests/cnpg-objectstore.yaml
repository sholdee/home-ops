---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: cnpg-powerdns-b2
spec:
  configuration:
    destinationPath: s3://sholdee-cnpg-powerdns/
    endpointURL: https://s3.us-west-002.backblazeb2.com
    s3Credentials:
      accessKeyId:
        name: powerdns-db-backup-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: powerdns-db-backup-creds
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
      encryption: AES256
    data:
      compression: gzip
      encryption: AES256
      jobs: 2
  retentionPolicy: 30d
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
