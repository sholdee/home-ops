---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dnsdist-config
  namespace: powerdns
data:
  dnsdist.conf: |
    setLocal("0.0.0.0:53", {reusePort=true})
    setACL({"0.0.0.0/0", "::/0"})

    -- Authoritative backend (PowerDNS Auth)
    newServer({address="10.43.231.221", pool="auth", checkName="sholdee.net.", checkType="SOA", tcpOnly=true})

    -- Forwarding backend (AdGuard Home)
    newServer({address="192.168.77.54:53", pool="forward", checkName="google.com.", tcpOnly=true})

    -- Fallback: Cloudflare DNS for Families (malware + adult blocking) over DoT
    newServer({address="1.1.1.3:853", tls="openssl", subjectName="cloudflare-dns.com", validateCertificates=true, pool="fallback", checkName="google.com.", rise=3, maxCheckFailures=3, checkInterval=3})
    newServer({address="1.0.0.3:853", tls="openssl", subjectName="cloudflare-dns.com", validateCertificates=true, pool="fallback", checkName="google.com.", rise=3, maxCheckFailures=3, checkInterval=3})

    -- Authoritative zones (SuffixMatchNodeRule matches all subdomains)
    local authZones = newSuffixMatchNode()
    authZones:add(newDNSName("sholdee.net."))

    -- Route authoritative queries to PowerDNS Auth, fall back to forward if auth is down
    addAction(AndRule({SuffixMatchNodeRule(authZones), PoolAvailableRule("auth")}), PoolAction("auth"))

    -- Forward to AdGuard when available, otherwise fall back to public resolvers
    addAction(PoolAvailableRule("forward"), PoolAction("forward"))
    addAction(AllRule(), PoolAction("fallback"))

    -- Packet cache (10k entries, TTL clamped 60s-3600s, serve stale for 60s)
    pc = newPacketCache(10000, {maxTTL=3600, minTTL=60, staleTTL=60})
    getPool("auth"):setCache(pc)
    getPool("forward"):setCache(pc)
    getPool("fallback"):setCache(pc)
