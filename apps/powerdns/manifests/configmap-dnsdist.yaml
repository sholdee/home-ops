---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dnsdist-config
  namespace: powerdns
data:
  dnsdist.conf: |
    setLocal("0.0.0.0:53", {reusePort=true})
    setACL({"0.0.0.0/0", "::/0"})

    -- Authoritative backend (PowerDNS Auth)
    newServer({address="10.43.231.221", pool="auth", checkName="sholdee.net.", checkType="SOA", tcpOnly=true})

    -- Forwarding backend (AdGuard Home)
    newServer({address="192.168.77.54:53", pool="forward", checkName="google.com."})

    -- Authoritative zones (SuffixMatchNodeRule matches all subdomains)
    local authZones = newSuffixMatchNode()
    authZones:add(newDNSName("sholdee.net."))

    -- Route authoritative queries to PowerDNS Auth, fall back to forward if auth is down
    addAction(AndRule({SuffixMatchNodeRule(authZones), PoolAvailableRule("auth")}), PoolAction("auth"))

    -- Forward everything else (including auth zones when auth pool is unavailable) to AdGuard
    addAction(AllRule(), PoolAction("forward"))
