---
apiVersion: v1
kind: Service
metadata:
  name: powerdns
  namespace: powerdns
  labels:
    app: dnsdist
spec:
  selector:
    app: dnsdist
  ports:
    - protocol: UDP
      port: 53
      targetPort: 53
      name: dns
    - protocol: TCP
      port: 53
      targetPort: 53
      name: dns-tcp
  type: LoadBalancer
  loadBalancerIP: 192.168.77.53
  externalTrafficPolicy: Cluster
---
apiVersion: v1
kind: Service
metadata:
  name: powerdns-auth
  namespace: powerdns
  labels:
    app: powerdns
spec:
  selector:
    app: powerdns
  ports:
    - protocol: UDP
      port: 53
      targetPort: 53
      name: dns
    - protocol: TCP
      port: 53
      targetPort: 53
      name: dns-tcp
  type: ClusterIP
  clusterIP: 10.43.231.221
---
apiVersion: v1
kind: Service
metadata:
  name: powerdns-api
  namespace: powerdns
  labels:
    app: powerdns
spec:
  selector:
    app: powerdns
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      name: api
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: poweradmin
  namespace: powerdns
  labels:
    app: poweradmin
spec:
  selector:
    app: poweradmin
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      name: http
  type: ClusterIP
