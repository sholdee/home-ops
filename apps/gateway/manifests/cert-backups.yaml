---
# yaml-language-server: $schema=https://kube-schemas.shold.io/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gateway-cert-backups
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.external-secrets.svc.cluster.local:8080
      vaults:
        Kubernetes: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: op-credentials
            key: token
            namespace: external-secrets
---
# yaml-language-server: $schema=https://kube-schemas.shold.io/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-wildcard-restore
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshPolicy: CreatedOnce
  secretStoreRef:
    name: gateway-cert-backups
    kind: ClusterSecretStore
  target:
    name: external-wildcard
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: gateway-external-wildcard
        property: tls.crt
    - secretKey: tls.key
      remoteRef:
        key: gateway-external-wildcard
        property: tls.key
---
# yaml-language-server: $schema=https://kube-schemas.shold.io/external-secrets.io/externalsecret_v1.json
